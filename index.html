<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Android MCQ Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      max-width: 650px;
      width: 100%;
      margin: auto;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      color: white;
      animation: fadeIn 0.8s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    #number {
      text-align: center;
      font-size: 18px;
      margin-bottom: 15px;
    }

    h2 {
      font-size: 24px;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 17px;
      cursor: pointer;
      border: none;
      border-radius: 14px;
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.03);
    }

    #options button {
      background: white;
      color: #333;
      font-weight: bold;
    }

    #options button:hover {
      background: #ffe082;
    }

    .correct {
      background: #43a047 !important;
      color: white !important;
    }

    .wrong {
      background: #e53935 !important;
      color: white !important;
    }

    #result {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
      min-height: 28px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Android MCQ Practice</h1>
  <p id="number"></p>
  <h2 id="question"></h2>
  <div id="options"></div>
  <p id="result"></p>
</div>

<script>
let questions = [
{
  question: "You created an app, but when you click a button, nothing happens. You forgot to link the button with code. What is missing?",
  options: ["Intent", "OnClickListener", "Fragment", "Service"],
  answer: "OnClickListener"
},
{
  question: "An app crashes immediately after launch due to a missing permission for internet. Where should you declare it?",
  options: ["activity_main.xml", "build.gradle", "AndroidManifest.xml", "strings.xml"],
  answer: "AndroidManifest.xml"
},
{
  question: "You want to pass data from one Activity to another. What should you use?",
  options: ["Fragment", "Intent", "Service", "View"],
  answer: "Intent"
},
{
  question: "Your app freezes when performing a long operation on the main thread. What is the issue?",
  options: ["Memory leak", "ANR", "Syntax error", "API error"],
  answer: "ANR"
},
{
  question: "You want to display a list of 1000 items efficiently. What should you use?",
  options: ["TextView", "LinearLayout", "RecyclerView", "ScrollView"],
  answer: "RecyclerView"
},
{
  question: "Your app needs to run music in the background even after the app is closed. Which component should be used?",
  options: ["Activity", "Fragment", "Service", "Intent"],
  answer: "Service"
},
{
  question: "You want to show a short popup message when a user clicks a button. What should you use?",
  options: ["AlertDialog", "Toast", "Notification", "Snackbar"],
  answer: "Toast"
},
{
  question: "You need to store structured data locally in your app. What is the best option?",
  options: ["SharedPreferences", "SQLite", "Intent", "Service"],
  answer: "SQLite"
},
{
  question: "You want your UI to adapt to different screen sizes using constraints. Which layout is best?",
  options: ["LinearLayout", "FrameLayout", "ConstraintLayout", "TableLayout"],
  answer: "ConstraintLayout"
},
{
  question: "You want to update UI automatically when data changes. Which component helps?",
  options: ["View", "LiveData", "Intent", "Service"],
  answer: "LiveData"
},
{
  question: "Your app should respond when the device battery is low. Which component should you use?",
  options: ["Activity", "Broadcast Receiver", "Service", "Fragment"],
  answer: "Broadcast Receiver"
},
{
  question: "You want to connect your app to a REST API. Which library is commonly used?",
  options: ["Glide", "Retrofit", "Room", "Picasso"],
  answer: "Retrofit"
},
{
  question: "You want to design UI without writing XML. Which modern toolkit should you use?",
  options: ["Jetpack Compose", "RecyclerView", "ConstraintLayout", "Fragment"],
  answer: "Jetpack Compose"
},
{
  question: "An app needs to save small key-value pairs like login status. What should be used?",
  options: ["SQLite", "SharedPreferences", "Room", "Intent"],
  answer: "SharedPreferences"
},
{
  question: "Your app crashes due to null reference when accessing a view. What is the issue?",
  options: ["Memory leak", "NullPointerException", "ANR", "API error"],
  answer: "NullPointerException"
},
{
  question: "You want to reuse a UI component in multiple activities. What should you use?",
  options: ["Service", "Fragment", "Intent", "BroadcastReceiver"],
  answer: "Fragment"
},
{
  question: "Your app needs to load images from the internet efficiently. Which library can help?",
  options: ["Retrofit", "Glide", "Room", "LiveData"],
  answer: "Glide"
},
{
  question: "You want navigation between screens with back stack support. What should you use?",
  options: ["Intent only", "Navigation Component", "FragmentManager", "Service"],
  answer: "Navigation Component"
},
{
  question: "You need to perform background work without blocking UI. What should you use?",
  options: ["Activity", "Main thread", "AsyncTask / Coroutine", "Layout"],
  answer: "AsyncTask / Coroutine"
},
{
  question: "You want to debug your app and see logs. Which tool will you use in Android Studio?",
  options: ["Emulator", "Logcat", "Gradle", "ADB"],
  answer: "Logcat"
},
{
  question: "Your app must access the camera. What is required first?",
  options: ["Layout file", "Permission in Manifest", "Intent", "Service"],
  answer: "Permission in Manifest"
},
{
  question: "You want to display a dialog box asking user confirmation. What should you use?",
  options: ["Toast", "AlertDialog", "Intent", "Service"],
  answer: "AlertDialog"
},
{
  question: "Your app UI overlaps elements accidentally. Which layout may cause this?",
  options: ["LinearLayout", "FrameLayout", "ConstraintLayout", "GridLayout"],
  answer: "FrameLayout"
},
{
  question: "You want to bind UI components safely without findViewById(). What should you use?",
  options: ["ViewBinding", "Intent", "Service", "Fragment"],
  answer: "ViewBinding"
},
{
  question: "You want your app to work offline and sync later. Which approach is best?",
  options: ["Only API calls", "Local DB + Sync", "Only UI", "Intent"],
  answer: "Local DB + Sync"
},
{
  question: "Your app crashes due to heavy memory usage. What is the issue?",
  options: ["ANR", "Memory leak", "Syntax error", "Intent error"],
  answer: "Memory leak"
},
{
  question: "You want to schedule a task even if app is closed. What should you use?",
  options: ["Activity", "Service", "WorkManager", "Fragment"],
  answer: "WorkManager"
},
{
  question: "User rotates the screen and data is lost. What should be used?",
  options: ["Intent", "ViewModel", "Service", "Layout"],
  answer: "ViewModel"
},
{
  question: "You want to show temporary message with action button. What should you use?",
  options: ["Toast", "Snackbar", "Dialog", "Notification"],
  answer: "Snackbar"
},
{
  question: "You want to test app on different devices without real phones. What should you use?",
  options: ["SDK", "Emulator", "APK", "Gradle"],
  answer: "Emulator"
}
];

let current = 0;
let questionEl = document.getElementById("question");
let optionsEl = document.getElementById("options");
let resultEl = document.getElementById("result");
let numberEl = document.getElementById("number");

function loadQuestion() {
  let q = questions[current];
  numberEl.innerText = "Question " + (current + 1) + " of " + questions.length;
  questionEl.innerText = q.question;
  optionsEl.innerHTML = "";
  resultEl.innerText = "";

  q.options.forEach(function(option) {
    let btn = document.createElement("button");
    btn.innerText = option;

    btn.onclick = function() {
      let buttons = optionsEl.getElementsByTagName("button");

      if (option === q.answer) {
        btn.classList.add("correct");
        resultEl.innerText = "Correct";

        for (let i = 0; i < buttons.length; i++) {
          buttons[i].disabled = true;
        }

        setTimeout(function() {
          current++;
          if (current < questions.length) {
            loadQuestion();
          } else {
            numberEl.innerText = "";
            questionEl.innerText = "Finished 🎯";
            optionsEl.innerHTML = "";
            resultEl.innerText = "Test completed";
          }
        }, 1000);

      } else {
        btn.classList.add("wrong");
        btn.disabled = true;
        resultEl.innerText = "Wrong, try again";
      }
    };

    optionsEl.appendChild(btn);
  });
}

loadQuestion();
</script>

</body>
</html>
